<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Táblázat</title>
    <style>
        table {
            border: 1px solid blue;
            border-collapse: collapse;
            width: 50%;
        }
        th, td {
            border: 1px solid blue;
            padding: 5px;
        }
    </style>
</head>
<body>
    <h2>Táblázat tömb elemeiből</h2>
    <table>

    </table>
    <script>
        const fejlec = ["Sport,mozgás", "Kcal/óra", "perc","kcal"]
        const adatok = [
            {
                sport: "Futás",
                kcalora: "680",
                perc: "<input type='number' onkeyup='szamolas()' onchange='szamolas()' min='1' id='futas' size='10'>",
                kcal:"<input type='number' onkeyup='szamolas()' onchange='szamolas()' min='1' id='futaskcal' size='10' disabled>"
               
            },
            {
                sport: "focizás",
                kcalora: "550",
                perc: "<input type='number' onkeyup='szamolas()' onchange='szamolas()' min='1' id='foci' size='10'>",
                kcal:"<input type='number' onkeyup='szamolas()' onchange='szamolas()' min='1' id='focikcal' size='10' disabled>"
               
            },
            {
                sport: "bringázás",
                kcalora: "480",
                perc: "<input type='number' onkeyup='szamolas()' onchange='szamolas()' min='1' id='bringa' size='10'>",
                kcal:"<input type='number' onkeyup='szamolas()' onchange='szamolas()' min='1' id='bringakcal' size='10' disabled>"
               
            },
            {
                sport: "hegymászás",
                kcalora: "420",
                perc: "<input type='number' onkeyup='szamolas()' onchange='szamolas()' min='1' id='hegym' size='10'>",
                kcal:"<input type='number' onkeyup='szamolas()' onchange='szamolas()' min='1' id='hegykcal' size='10' disabled>"
               
            },
            {
                sport: "lovaglás",
                kcalora: "370",
                perc: "<input type='number' onkeyup='szamolas()' onchange='szamolas()' min='1' id='lovaglas' size='10'>",
                kcal:"<input type='number' onkeyup='szamolas()' onchange='szamolas()' min='1' id='lovaglaskcal' size='10' disabled>"
               
            },
            {
                sport: "Túrázás",
                kcalora: "360",
                perc: "<input type='number' onkeyup='szamolas()' onchange='szamolas()' min='1' id='túra' size='10'>",
                kcal:"<input type='number' onkeyup='szamolas()' onchange='szamolas()' min='1' id='túrakcal' size='10' disabled>"
               
            },
            {
                sport: "kajakozás",
                kcalora: "340",
                perc: "<input type='number' onkeyup='szamolas()' onchange='szamolas()' min='1' id='kajak' size='10'>",
                kcal:"<input type='number' onkeyup='szamolas()' onchange='szamolas()' min='1' id='kajakkcal' size='10' disabled>"
               
            },
            {
                sport: "súlyzós edzés",
                kcalora: "320",
                perc: "<input type='number' onkeyup='szamolas()' onchange='szamolas()' min='1' id='edzés' size='10'>",
                kcal:"<input type='number' onkeyup='szamolas()' onchange='szamolas()' min='1' id='edzéskcal' size='10' disabled>"
               
            },
            {
                sport: "pingpongozás",
                kcalora: "270",
                perc: "<input type='number' onkeyup='szamolas()' onchange='szamolas()' min='1' id='pingpong' size='10'>",
                kcal:"<input type='number' onkeyup='szamolas()' onchange='szamolas()' min='1' id='pingpongkcal' size='10' disabled>"
               
            },
            {
                sport: "kutyasétáltatás",
                kcalora: "200",
                perc: "<input type='number' onkeyup='szamolas()' onchange='szamolas()' min='1' id='kutyasétál' size='10'>",
                kcal:"<input type='number' onkeyup='szamolas()' onchange='szamolas()' min='1' id='kutyakcal' size='10' disabled>"
               
            },
            {
                sport: "összesen",
                kcalora: "",
                perc: "<input type='number' onkeyup='szamolas()' onchange='szamolas()' min='1' id='öszperc' size='10'>",
                kcal:"<input type='number' onkeyup='szamolas()' onchange='szamolas()' min='1' id='öszkcal' size='10'>"
               
            },
            {
                sport: "Napi energiaszükséglet (2000 kcal) arányban:",
                kcalora: "",
                perc: "",
                kcal:"<input type='number' onkeyup='szamolas()' onchange='szamolas()' min='1' id='arány' size='10'>%"
               
            }
        ]

        document.body.onload = function() {
            addTHs(fejlec)
            addTR(adatok)
        }

        function addTR(arr) {
            const table = document.querySelector("table")
            for (let i = 0; i < arr.length; i++) {
                const tr = document.createElement("tr")
                table.appendChild(tr)
                addTD(tr, arr[i].sport)
                addTD(tr, arr[i].kcalora)
                addTD(tr, arr[i].perc, true)
                addTD(tr, arr[i].kcal, true)                
            }
        }

        function addTD(parent, content, isHTML = false) {
            const td = document.createElement("td")
            if (isHTML) {
                td.innerHTML = content;
            } else {
                td.innerText = content;
            }
            parent.appendChild(td)
        }

        function addTHs(arr) {
            const table = document.querySelector("table")
            const tr = document.createElement("tr")
            table.appendChild(tr)
            for (let i = 0; i < arr.length; i++) {
                const th = document.createElement("th")
                th.innerText = arr[i]
                table.appendChild(th)                
            }
        }

        function szamolas() 
        {
            oszperc = 0
            oszkcal = 0
            
            fut = document.getElementById('futas').value
            if(fut !== '')
            {
                
                futperc = parseFloat(document.getElementById('futas').value)
                futkcal = (futperc/60)*680
                document.getElementById('futaskcal').value = futkcal
                oszperc += futperc
                oszkcal += futkcal
                futkcal = 0
            }
            else
            {
                futkcal = 0
                document.getElementById('futaskcal').value = futkcal
            }
            
            
            

            foc = document.getElementById('foci').value
            if(foc !== '')
            {
                focperc = parseFloat(document.getElementById('foci').value)
                fockcal=(focperc/60)*550
                document.getElementById('focikcal').value = fockcal
                oszperc += focperc
                oszkcal += fockcal 
                fockcal = 0
                
            }
            else
            {
                fockcal = 0
                document.getElementById('focikcal').value = fockcal
            }

            brin = document.getElementById('bringa').value
            if(brin !== '')
            {
                brinperc = parseFloat(document.getElementById('bringa').value)
                brinkcal=(brinperc/60)*480
                document.getElementById('bringakcal').value = brinkcal
                oszperc += brinperc
                oszkcal += brinkcal 
                brinkcal = 0
                
            }
            else
            {
                brinkcal = 0
                document.getElementById('bringakcal').value = brinkcal
            }
            
            heg = document.getElementById('hegym').value
            if(heg !== '')
            {
                
                hegperc = parseFloat(document.getElementById('hegym').value)
                hegkcal=(hegperc/60)*420
                document.getElementById('hegykcal').value = hegkcal
                oszperc += hegperc
                oszkcal += hegkcal
                hegkcal = 0
            }
            else
            {
                hegkcal = 0
                document.getElementById('hegykcal').value = hegkcal
            }
            
            lo = document.getElementById('lovaglas').value
            if(lo !== '')
            {
                
                loperc = parseFloat(document.getElementById('lovaglas').value)
                lokcal=(loperc/60)*370
                document.getElementById('lovaglaskcal').value = lokcal
                oszperc += loperc
                oszkcal += lokcal
                lokcal = 0
            }
            else
            {
                lokcal = 0
                document.getElementById('hegykcal').value = hegkcal
            }
            
            tu = document.getElementById('túra').value
            if(tu !== '')
            {
                
                turperc = parseFloat(document.getElementById('túra').value)
                turkcal=(turperc/60)*360
                document.getElementById('túrakcal').value = turkcal
                oszperc += turperc
                oszkcal += turkcal
                turkcal = 0
            }
            else
            {
                turkcal = 0
                document.getElementById('túrakcal').value = turkcal
            }
            
            kaj = document.getElementById('kajak').value
            if(kaj !== '')
            {
                
                kajperc = parseFloat(document.getElementById('kajak').value)
                kajkcal=(kajperc/60)*340
                document.getElementById('kajakkcal').value = kajkcal
                oszperc += kajperc
                oszkcal += kajkcal
                kajkcal = 0
            }
            else
            {
                kajkcal = 0
                document.getElementById('kajakkcal').value = kajkcal
            }

            ed = document.getElementById('edzés').value
            if(ed !== '')
            {
                
                edperc = parseFloat(document.getElementById('edzés').value)
                edkcal=(edperc/60)*320
                document.getElementById('edzéskcal').value = edkcal
                oszperc += edperc
                oszkcal += edkcal
                edkcal = 0
            }
            else
            {
                edkcal = 0
                document.getElementById('edzéskcal').value = edkcal
            }             
            
            ping = document.getElementById('pingpong').value
            if(ping !== '')
            {
                
                pingperc = parseFloat(document.getElementById('pingpong').value)
                pingkcal=(pingperc/60)*270
                document.getElementById('pingpongkcal').value = pingkcal
                oszperc += pingperc
                oszkcal += pingkcal
                pingkcal = 0
            }
            else
            {
                pingkcal = 0
                document.getElementById('pingpongkcal').value = pingkcal
            }        
            
            kuty = document.getElementById('kutyasétál').value
            if(kuty !== '')
            {
                
                kutyperc = parseFloat(document.getElementById('kutyasétál').value)
                kutykcal=(kutyperc/60)*200
                document.getElementById('kutyakcal').value = kutykcal
                oszperc += kutyperc
                oszkcal += kutykcal
                kutykcal = 0
            }
            else
            {
                kutykcal = 0
                document.getElementById('kutyakcal').value = kutykcal
            }

            
            
            

            

            szazalek = (oszkcal / 2000) * 100            

            /*
            oszperc = oszperc + futperc + focperc +brinperc +hegkcal+loperc+turperc+kajperc+edperc+pingperc+kutyperc
            (oszkcal / 2000)*100
            */

            document.getElementById('arány').value = szazalek
            document.getElementById('öszperc').value = oszperc
            document.getElementById('öszkcal').value = oszkcal
        
        
            
            
        }

    </script>
</body>
</html>
